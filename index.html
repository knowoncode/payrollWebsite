<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dzinex Technologies - Home</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo">Dzinex Technologies</div>
        <nav>
            <ul>
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="employee.html">Employee</a></li>
                <li><a href="admin.html">Admin</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2 class="tagline">Empowering the Future with Seamless Payroll Solutions</h2>
        
        <div class="carousel-container">
            <div class="slide active">
                <svg viewBox="0 0 800 300" preserveAspectRatio="none">
                    <defs>
                        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <rect width="100%" height="100%" fill="url(#grad1)" />
                    <text x="50%" y="50%" fill="white" font-size="24" font-family="Arial" text-anchor="middle" dy=".3em">Team Collaboration</text>
                </svg>
            </div>
            <div class="slide">
                <svg viewBox="0 0 800 300" preserveAspectRatio="none">
                    <defs>
                        <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <rect width="100%" height="100%" fill="url(#grad2)" />
                    <text x="50%" y="50%" fill="white" font-size="24" font-family="Arial" text-anchor="middle" dy=".3em">Innovative Workspace</text>
                </svg>
            </div>
            <div class="slide">
                <svg viewBox="0 0 800 300" preserveAspectRatio="none">
                    <defs>
                        <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <rect width="100%" height="100%" fill="url(#grad3)" />
                    <text x="50%" y="50%" fill="white" font-size="24" font-family="Arial" text-anchor="middle" dy=".3em">Global Operations</text>
                </svg>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Employees</h3>
                <div class="stat-number" data-target="1542">0</div>
                <p>Active Staff Members</p>
            </div>
            <div class="stat-card delay-1">
                <h3>Monthly Sales ($)</h3>
                <div class="stat-number" data-target="85400">0</div>
                <p>Generated Revenue</p>
            </div>
            <div class="stat-card delay-2">
                <h3>Offices</h3>
                <div class="stat-number" data-target="12">0</div>
                <p>Global Locations</p>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Dzinex Technologies. All rights reserved.</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
