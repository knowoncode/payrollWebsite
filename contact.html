<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo">Dzinex Technologies</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="employee.html">Employee</a></li>
                <li><a href="admin.html">Admin</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2 class="page-title" style="text-align: center;">Get in Touch</h2>
        
        <div class="glass-panel" style="max-width: 600px; margin: 0 auto;">
            <form>
                <div class="form-group">
                    <input type="text" required>
                    <label>Your Name</label>
                </div>
                <div class="form-group">
                    <input type="email" required>
                    <label>Your Email</label>
                </div>
                <div class="form-group">
                    <textarea rows="5" required></textarea>
                    <label>Your Message</label>
                </div>
                <button type="submit" style="width: 100%;">Send Message</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Dzinex Technologies. All rights reserved.</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
